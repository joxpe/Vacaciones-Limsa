<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administrador Vacaciones</title>
  <link rel="stylesheet" href="admin-panel.css?v=3">
</head>
<body>

  <!-- Botón para regresar al inicio -->
  <div class="back-link">
    <a href="index.html" class="back-button" title="Regresar a inicio">⬅️ Regresar</a>
  </div>
  
  <div id="login-screen" class="login-screen">
    <h2>Acceso Administrador</h2>
    <input type="password" id="admin-pass" placeholder="Contraseña">
    <button id="login-btn">Entrar</button>
    <p id="login-error" class="error"></p>
  </div>

  <div id="admin-panel" class="hidden">
    <div class="toolbar">
      <button id="logout-btn">Cerrar sesión</button>
      <button id="refresh-btn">🔄 Actualizar</button>
    </div>
    <h1>Panel de Vacaciones (Administrador)</h1>

    <nav class="ap-tabs" aria-label="Módulos">
      <button type="button" class="ap-tab active" data-tab="solicitudes">Solicitudes</button>
      <button type="button" class="ap-tab" data-tab="alta-vac">Alta vacaciones</button>
      <button type="button" class="ap-tab" data-tab="colaboradores">Colaboradores</button>
    </nav>

    <!-- Módulo: Solicitudes -->
    <section id="tab-solicitudes" class="ap-module">
<!-- Filtros -->
    <div class="filters filters-grid" aria-label="Filtros">
      <div class="fitem span2">
        <label class="f-label" for="f-bodega">Bodega</label>
        <select id="f-bodega" multiple size="6" class="multi"></select>
        <small class="hint">Deja sin seleccionar para ver todas</small>
      </div>

      <div class="fitem">
        <label for="f-depto">Departamento</label>
        <select id="f-depto">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="fitem">
        <label for="f-localizacion">Localización</label>
        <select id="f-localizacion">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="fitem span2">
        <label for="f-rol">Rol</label>
        <select id="f-rol" multiple size="4" class="multi"></select>
        <small class="hint">(Ctrl/⌘ + clic para varias)</small>
      </div>

      <div class="fitem">
        <label for="f-status">Estado</label>
        <select id="f-status">
          <option value="">Todas</option>
          <option value="Aprobado">Autorizadas</option>
          <option value="Rechazado">Rechazadas</option>
          <option value="Pendiente">Pendientes</option>
        </select>
      </div>

      <div class="fitem">
        <label for="f-month">Mes</label>
        <select id="f-month">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="fitem">
        <label for="f-week">Semana</label>
        <select id="f-week">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="fitem">
        <label for="f-emp">Colaborador</label>
        <input type="search" id="f-emp" placeholder="Nombre contiene…">
      </div>

      <div class="fitem fchecks">
        <label class="check">
          <input type="checkbox" id="f-overlaps" />
          <span>Solo empalmes</span>
        </label>

        <label class="check">
          <input type="checkbox" id="f-cross-only" />
          <span>Solo entre bodegas distintas</span>
        </label>
      </div>
    </div>

    <!-- Lista de solicitudes -->
    <div id="vac-list"></div>
    </section>

    <!-- Módulo: Alta directa de vacaciones -->
    <section id="tab-alta-vac" class="ap-module hidden" aria-hidden="true">
      <div class="card">
<div class="card" style="margin-top:16px;">
        <h3>Alta directa de vacaciones</h3>
        <div class="emp-vac-form" style="display:grid; gap:12px; grid-template-columns: 1fr 140px 140px auto auto; align-items:end;">
          <div>
            <label for="vac-emp-search">Empleado</label>
            <input type="text" id="vac-emp-search" placeholder="Buscar por nombre…" autocomplete="off">
            <div id="vac-emp-suggest" class="suggest" style="position:relative;"></div>
            <input type="hidden" id="vac-emp-id">
          </div>
          <div>
            <label for="vac-start">Inicio</label>
            <input type="date" id="vac-start">
          </div>
          <div>
            <label for="vac-end">Fin</label>
            <input type="date" id="vac-end">
          </div>
          <button id="vac-create" type="button">➕ Crear (Pendiente)</button>
          <button id="vac-create-approve" type="button">✅ Crear y autorizar</button>
        </div>

        <!-- opcional: presets de rango -->
        <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
          <button type="button" class="preset" data-preset="this-week">Esta semana</button>
          <button type="button" class="preset" data-preset="next-week">Siguiente semana</button>
        </div>

        <div id="vac-form-msg" class="msg"></div>
      </div>
      </div>
    </section>

<!-- Módulo: Colaboradores -->
    <section id="tab-colaboradores" class="ap-module hidden" aria-hidden="true">
      <div id="emp-panel" class="card">
        <div class="emp-head">
          <h2 style="margin:0;">Colaboradores</h2>
</div>

<div class="emp-toolbar" style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <input id="emp-search" type="search" placeholder="Buscar por nombre…" />
        <button id="emp-refresh-btn" type="button">🔄 Actualizar empleados</button>
        <button id="emp-export-btn" type="button">⬇️ Exportar CSV</button>
        <label class="emp-import">
          ⬆️ Importar CSV
          <input type="file" id="emp-import-input" accept=".csv" hidden>
        </label>
      </div>

        <div id="emp-sub-alta" class="emp-block">
          <h3 class="emp-block-title">Alta</h3>
<form id="emp-form" class="emp-form">
        <div class="emp-grid">
          <div>
            <label for="emp-nombre">Nombre</label>
            <input type="text" id="emp-nombre" required>
          </div>
          <div>
            <label for="emp-bodega">Bodega</label>
            <input type="text" id="emp-bodega">
          </div>
          <div>
            <label for="emp-depto">Departamento</label>
            <input type="text" id="emp-depto">
          </div>
          <div>
            <label for="emp-localizacion">Localización</label>
            <input type="text" id="emp-localizacion">
          </div>
          <div>
            <label for="emp-rol">Rol</label>
            <input type="text" id="emp-rol" placeholder="chofer, supervisor, jefe…">
          </div>
          <div>
            <label for="emp-ingreso">Fecha ingreso</label>
            <input type="date" id="emp-ingreso" required>
          </div>
        </div>

        <button type="submit">➕ Dar de alta empleado</button>
      </form>
<div id="emp-msg" class="msg"></div>
        </div>

        <div id="emp-sub-lista" class="emp-block">
          <h3 class="emp-block-title">Listado</h3>
<div id="emp-list" class="emp-list"></div>
        </div>
      </div>
    </section>
  </div>
